<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CafeClick - Selection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="frame.css">
    <script src="frame.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#1C1B1F]">
    <div class="w-full min-h-screen px-4 py-6 max-w-md mx-auto">
        <!-- Header -->
        <div class="mb-6">
            <h1 class="text-[#E6E1E5] mb-6 text-xl font-semibold">
                Where are you ordering from today?
            </h1>
        </div>

        <!-- Search Bar -->
        <div class="relative mb-6">
            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-[#CAC4D0]"></i>
            <input
                type="text"
                id="search-input"
                onkeyup="filterMahallahs()"
                placeholder="Search Cafe or Mart..."
                class="w-full pl-12 pr-4 py-3 bg-[#2B2930] rounded-full border-none outline-none text-[#E6E1E5] placeholder:text-[#938F99]"
            />
        </div>

        <!-- Mahallah List -->
        <div id="mahallah-list" class="space-y-4">
            <!-- Rendered by JS -->
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Auth check
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser || currentUser.role !== 'customer') {
            navigateTo('login.html'); throw new Error('redirect');
        }

        const mahallahs = [
            { id: '7', name: 'ZC Mart', status: 'open', queueLevel: 'low', distance: 0.1, type: 'mart' },
            { id: '8', name: 'Ali Mart', status: 'open', queueLevel: 'medium', distance: 0.4, type: 'mart' },
            { id: '1', name: 'Mahallah Asiah', status: 'open', queueLevel: 'low', distance: 0.2, type: 'cafe' },
            { id: '2', name: 'Mahallah Faruq', status: 'open', queueLevel: 'high', distance: 0.5, type: 'cafe' },
            { id: '3', name: 'Mahallah Siddiq', status: 'open', queueLevel: 'medium', distance: 1.2, type: 'cafe' },
            { id: '4', name: 'Mahallah Bilal', status: 'open', queueLevel: 'low', distance: 0.8, type: 'cafe' },
            { id: '5', name: 'Mahallah Uthman', status: 'closed', queueLevel: 'low', distance: 4.5, type: 'cafe' },
            { id: '6', name: 'Mahallah Aminah', status: 'open', queueLevel: 'medium', distance: 0.3, type: 'cafe' },
        ];

        function getStatusColor(status) {
            return status === 'open' ? 'text-[#A8DAB5] bg-[#1F3823]' : 'text-[#CAC4D0] bg-[#36343B]';
        }

        function getQueueColor(level) {
            switch (level) {
                case 'low': return '🟢';
                case 'medium': return '🟡';
                case 'high': return '🔴';
                default: return '⚪';
            }
        }

        function getQueueText(level) {
            switch (level) {
                case 'low': return 'Low Queue';
                case 'medium': return 'Medium Queue';
                case 'high': return 'High Queue';
                default: return '';
            }
        }

        function getDistanceColor(dist) {
            if (dist < 1.0) return '🟢';
            if (dist < 3.0) return '🟡';
            return '🔴';
        }

        function renderMahallahs(items) {
            const listContainer = document.getElementById('mahallah-list');
            listContainer.innerHTML = '';
            
            items.forEach(mahallah => {
                const btn = document.createElement('button');
                btn.className = "w-full bg-[#2B2930] rounded-2xl p-5 flex items-center gap-4 hover:bg-[#36343B] transition-colors";
                btn.onclick = () => selectMahallah(mahallah);

                let queueDistanceHtml = '';
                if (mahallah.status === 'open') {
                    queueDistanceHtml = `
                        <span class="text-xs text-[#CAC4D0] flex items-center">
                            ${getQueueColor(mahallah.queueLevel)} ${getQueueText(mahallah.queueLevel)}
                        </span>
                        <span class="text-[#49454F] text-[10px]">•</span>
                        <span class="text-xs text-[#CAC4D0] flex items-center">
                            ${getDistanceColor(mahallah.distance)} ${mahallah.distance} km
                        </span>
                    `;
                }

                const iconName = mahallah.type === 'mart' ? 'store' : 'map-pin';

                btn.innerHTML = `
                    <div class="w-12 h-12 rounded-full bg-[#4A4458] flex items-center justify-center flex-shrink-0">
                        <i data-lucide="${iconName}" class="w-6 h-6 text-[#D0BCFF]"></i>
                    </div>
                    <div class="flex-1 text-left">
                        <h3 class="text-[#E6E1E5] mb-1 font-medium">${mahallah.name}</h3>
                        <div class="flex flex-wrap items-center gap-2">
                            <span class="px-2 py-0.5 rounded-full text-xs ${getStatusColor(mahallah.status)}">
                                ${mahallah.status === 'open' ? 'Open' : 'Closed'}
                            </span>
                            ${queueDistanceHtml}
                        </div>
                    </div>
                    <div class="text-[#938F99]">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M9 6L15 12L9 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                `;
                listContainer.appendChild(btn);
            });
            
            lucide.createIcons(); // Re-render icons inside dynamically created elements
        }

        function filterMahallahs() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = mahallahs.filter(m => m.name.toLowerCase().includes(query));
            renderMahallahs(filtered);
        }

        function selectMahallah(mahallah) {
            localStorage.setItem('selectedMahallah', JSON.stringify(mahallah));
            navigateTo('home.html');
        }

        // Initial render
        renderMahallahs(mahallahs);
    </script>
</body>
</html>
