<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CafeClick - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="frame.css">
    <script src="frame.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#1C1B1F]">
    <div class="w-full min-h-screen px-4 py-8 flex flex-col items-center justify-center max-w-md mx-auto">
        <!-- Logo and Header -->
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-gradient-to-br from-[#6750A4] to-[#D0BCFF] rounded-3xl flex items-center justify-center mx-auto mb-4">
                <i data-lucide="log-in" class="w-10 h-10 text-white"></i>
            </div>
            <h1 class="text-[#E6E1E5] mb-2 text-xl font-semibold">Welcome</h1>
            <p class="text-[#CAC4D0] text-sm">Sign in to continue</p>
        </div>

        <!-- Login Form -->
        <div class="w-full space-y-4 mb-6">
            <div>
                <label class="block text-[#CAC4D0] text-sm mb-2">Email / Matric No / Staff No</label>
                <input type="text" id="identifier" placeholder="student@iium.edu.my or 2012345" class="w-full px-4 py-3 bg-[#2B2930] rounded-xl border border-[#49454F] text-[#E6E1E5] placeholder:text-[#938F99] focus:outline-none focus:border-[#D0BCFF]">
            </div>

            <div>
                <label class="block text-[#CAC4D0] text-sm mb-2">Password</label>
                <input type="password" id="password" placeholder="Enter your password" class="w-full px-4 py-3 bg-[#2B2930] rounded-xl border border-[#49454F] text-[#E6E1E5] placeholder:text-[#938F99] focus:outline-none focus:border-[#D0BCFF]">
            </div>

            
        </div>

        <button id="btn-login" onclick="handleLogin()" class="w-full flex items-center justify-center gap-2 bg-[#D0BCFF] text-[#381E72] py-4 rounded-full font-semibold hover:bg-[#E8DEF8] transition-colors mb-4">
            <i id="login-spinner" data-lucide="loader-2" class="w-5 h-5 animate-spin hidden"></i>
            <span id="login-text">Sign In</span>
        </button>

        <div class="fixed bottom-10 left-0 right-0 flex justify-center pointer-events-none z-[9999]">
            <div id="toast" class="bg-[#4A4458] text-[#EADDFF] px-6 py-3 rounded-full text-sm font-medium opacity-0 transition-all duration-300 whitespace-nowrap translate-y-4 shadow-lg"></div>
        </div>

        <a href="register.html" class="text-[#D0BCFF] text-sm hover:text-[#E8DEF8] transition-colors">
            Don't have an account? Register here
        </a>

        <!-- Demo Credentials -->
        <div class="mt-8 p-4 bg-[#2B2930] rounded-xl w-full">
            <p class="text-[#CAC4D0] text-xs mb-2">Demo Credentials:</p>
            <div class="space-y-1 text-xs text-[#938F99]">
                <p>Customer: student / 123</p>
                <p>Staff: staff / 123</p>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Always reset demo users so shorthand logins work
        const initialUsers = [
            { id: '1', name: 'Ahmad Student', email: 'student@iium.edu.my', password: '123', role: 'customer', matricNo: '2012345', shorthand: 'student' },
            { id: '2', name: 'Outlet Staff', email: 'staff@iium.edu.my', password: '123', role: 'staff', staffNo: 'STF001', shorthand: 'staff' }
        ];
        // Merge with any registered users
        const existing = JSON.parse(localStorage.getItem('users') || '[]');
        const registered = existing.filter(u => u.id !== '1' && u.id !== '2');
        localStorage.setItem('users', JSON.stringify([...initialUsers, ...registered]));

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.remove('opacity-0', 'translate-y-4');
            t.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                t.classList.remove('opacity-100', 'translate-y-0');
                t.classList.add('opacity-0', 'translate-y-4');
            }, 2000);
        }

        function handleLogin() {
            const users = JSON.parse(localStorage.getItem('users'));
            const identifier = document.getElementById('identifier').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn-login');
            const spinner = document.getElementById('login-spinner');
            const text = document.getElementById('login-text');
            
            if (!identifier || !password) {
                showToast('Please enter your credentials.');
                return;
            }
            
            const id = identifier.toLowerCase();
            const user = users.find(u => 
                u.email === identifier || u.matricNo === identifier || u.staffNo === identifier || (u.shorthand && u.shorthand === id)
            );
            
            if (!user) {
                showToast('User not found');
                return;
            }
            
            if (user.password !== password) {
                showToast('Incorrect password');
                return;
            }

            btn.disabled = true;
            spinner.classList.remove('hidden');
            text.textContent = 'Signing in...';
            
            setTimeout(() => {
                localStorage.setItem('currentUser', JSON.stringify(user));
                if (user.role === 'customer') {
                    window.location.href = 'location.html';
                } else {
                    window.location.href = 'staff.html';
                }
            }, 1000);
        }
    </script>
</body>
</html>
