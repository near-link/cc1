<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1C1B1F">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>CafeClick - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="frame.css">
    <script src="frame.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-[#1C1B1F]">
    <!-- Home Tab -->
    <div id="tab-home" class="tab-content active w-full min-h-screen pb-24 max-w-md mx-auto">
        <!-- Header with Location Switcher -->
        <div class="sticky top-0 bg-[#1C1B1F] z-10 px-4 py-4 border-b border-[#36343B]">
            <a href="location.html" class="flex items-center gap-2 text-[#D0BCFF] hover:bg-[#2B2930] px-3 py-2 rounded-lg transition-colors w-max">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M12 2C8.13 2 5 5.13 5 9C5 14.25 12 22 12 22C12 22 19 14.25 19 9C19 5.13 15.87 2 12 2ZM12 11.5C10.62 11.5 9.5 10.38 9.5 9C9.5 7.62 10.62 6.5 12 6.5C13.38 6.5 14.5 7.62 14.5 9C14.5 10.38 13.38 11.5 12 11.5Z" fill="currentColor"/>
                </svg>
                <span id="mahallah-name" class="text-[#D0BCFF]">Loading...</span>
                <i data-lucide="chevron-down" class="w-4 h-4"></i>
            </a>
        </div>

        <!-- Content -->
        <div class="px-4 py-4">
            <!-- Welcome Banner -->
            <div class="bg-gradient-to-r from-[#4F378B] to-[#6750A4] rounded-3xl p-6 mb-6 text-white">
                <h2 id="welcome-message" class="mb-2 text-lg font-semibold">Welcome</h2>
                <p id="special-text" class="text-sm text-white/90">Today's Special: Nasi Goreng USA with Free Egg!</p>
            </div>

            <!-- Quick Filters -->
            <div class="mb-6">
                <h3 class="text-[#E6E1E5] mb-3">Categories</h3>
                <div id="categories-container" class="grid grid-cols-4 gap-2">
                    <!-- Rendered dynamically by JS -->
                </div>
            </div>

            <!-- Popular Now -->
            <div class="mb-6">
                <h3 class="text-[#E6E1E5] mb-3">Popular Now</h3>
                <div id="popular-items" class="space-y-3">
                    <!-- JS renders popular items -->
                </div>
            </div>

            <!-- All Menu Items -->
            <div>
                <h3 class="text-[#E6E1E5] mb-3">All Menu</h3>
                <div id="all-items" class="grid grid-cols-2 gap-3">
                    <!-- JS renders all items -->
                </div>
            </div>
        </div>
    </div>

    <!-- Profile Tab -->
    <div id="tab-profile" class="tab-content w-full min-h-screen pb-24 max-w-md mx-auto">
        <div class="sticky top-0 bg-[#1C1B1F] z-10 px-4 py-4 border-b border-[#36343B]">
            <h2 class="text-[#E6E1E5] text-lg font-semibold">Profile</h2>
        </div>
        <div class="px-4 py-6 space-y-4">
            <div class="bg-[#2B2930] rounded-2xl p-6">
                <div class="flex items-center gap-4 mb-4">
                    <div class="w-16 h-16 bg-[#4A4458] rounded-full flex items-center justify-center">
                        <i data-lucide="user" class="w-8 h-8 text-[#D0BCFF]"></i>
                    </div>
                    <div>
                        <h3 id="profile-name" class="text-[#E6E1E5] mb-1">Loading...</h3>
                        <p id="profile-email" class="text-[#CAC4D0] text-sm">Loading...</p>
                    </div>
                </div>
            </div>
            <div class="bg-[#2B2930] rounded-2xl p-4">
                <h3 class="text-[#E6E1E5] mb-3">Preferences</h3>
                <div class="space-y-2">
                    <button onclick="showToast('This is a demo!')" class="w-full text-left px-4 py-3 bg-[#211F26] rounded-xl text-[#CAC4D0] hover:bg-[#36343B] transition-colors">Order History</button>
                    <button onclick="showToast('This is a demo!')" class="w-full text-left px-4 py-3 bg-[#211F26] rounded-xl text-[#CAC4D0] hover:bg-[#36343B] transition-colors">Saved Addresses</button>
                    <button onclick="showToast('This is a demo!')" class="w-full text-left px-4 py-3 bg-[#211F26] rounded-xl text-[#CAC4D0] hover:bg-[#36343B] transition-colors">Payment Methods</button>
                </div>
            </div>
            <button onclick="handleLogout()" class="w-full bg-[#601410] text-[#F2B8B5] py-4 rounded-2xl hover:bg-[#8C1D18] transition-colors flex items-center justify-center gap-2">
                <i data-lucide="log-out" class="w-5 h-5"></i>
                <span>Logout</span>
            </button>
        </div>
    </div>

    <!-- Cart Tab -->
    <div id="tab-cart" class="tab-content w-full min-h-screen pb-32 max-w-md mx-auto relative">
        <div class="sticky top-0 bg-[#1C1B1F] z-10 px-4 py-4 border-b border-[#36343B]">
            <h2 class="text-[#E6E1E5] text-lg font-semibold">Cart & Checkout</h2>
        </div>
        <div class="px-4 py-4">
            <!-- Location Alert -->
            <div class="bg-[#4A4458] rounded-2xl p-4 mb-6 flex items-start gap-3">
                <i data-lucide="map-pin" class="w-5 h-5 text-[#D0BCFF] flex-shrink-0 mt-0.5"></i>
                <div>
                    <h4 class="text-[#D0BCFF] mb-1 font-semibold">Picking up from:</h4>
                    <p id="pickup-location" class="text-[#EADDFF]">Loading...</p>
                </div>
            </div>

            <!-- Cart Items -->
            <div class="mb-6">
                <h3 class="text-[#E6E1E5] mb-3">Order Items</h3>
                <div id="cart-items" class="space-y-3">
                    <!-- JS renders cart items here -->
                </div>
            </div>

            <!-- Payment Method -->
            <div class="mb-6">
                <h3 class="text-[#E6E1E5] mb-3">Payment Method</h3>
                <div class="space-y-2">
                    <button onclick="setPaymentMethod('online')" id="pay-online" class="payment-btn w-full flex items-center gap-3 p-4 rounded-xl border-2 transition-colors border-[#D0BCFF] bg-[#2B2930]">
                        <div id="pay-online-circle" class="w-5 h-5 rounded-full border-2 flex items-center justify-center border-[#D0BCFF]">
                            <div class="w-3 h-3 rounded-full bg-[#D0BCFF]"></div>
                        </div>
                        <i data-lucide="smartphone" class="w-5 h-5 text-[#CAC4D0]"></i>
                        <span class="text-[#E6E1E5]">Online Banking / QR</span>
                    </button>

                    <button onclick="setPaymentMethod('cash')" id="pay-cash" class="payment-btn w-full flex items-center gap-3 p-4 rounded-xl border-2 transition-colors border-[#49454F] bg-[#1C1B1F]">
                        <div id="pay-cash-circle" class="w-5 h-5 rounded-full border-2 flex items-center justify-center border-[#938F99]">
                        </div>
                        <i data-lucide="credit-card" class="w-5 h-5 text-[#CAC4D0]"></i>
                        <span class="text-[#E6E1E5]">Cash on Pickup</span>
                    </button>
                </div>
            </div>

            <!-- Order Summary -->
            <div class="bg-[#2B2930] rounded-2xl p-4 mb-6">
                <h3 class="text-[#E6E1E5] mb-3">Order Summary</h3>
                <div class="space-y-2 mb-4">
                    <div class="flex justify-between text-[#CAC4D0]">
                        <span>Subtotal</span>
                        <span id="subtotal">RM 0.00</span>
                    </div>
                    <div class="flex justify-between text-[#CAC4D0]">
                        <span>Service Fee</span>
                        <span id="service-fee">RM 0.50</span>
                    </div>
                </div>
                <div class="border-t border-[#49454F] pt-3 flex justify-between">
                    <span class="text-[#E6E1E5] font-semibold">Total</span>
                    <span id="total" class="text-[#D0BCFF] font-semibold">RM 0.00</span>
                </div>
            </div>

            <!-- Place Order Button -->
            <button onclick="placeOrder()" id="btn-place-order" disabled class="w-full flex items-center justify-center gap-2 bg-[#D0BCFF] text-[#381E72] font-semibold py-4 rounded-full hover:bg-[#E8DEF8] transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                <i id="place-order-spinner" data-lucide="loader-2" class="w-5 h-5 animate-spin hidden"></i>
                <span id="place-order-text">Place Order - RM 0.00</span>
            </button>
        </div>
    </div>

    <!-- Active Order Widget -->
    <button id="active-order-widget" onclick="navigateTo('tracking.html')" class="hidden fixed bottom-20 left-4 right-4 bg-[#E8DEF8] text-[#381E72] rounded-full py-4 px-6 flex items-center gap-3 shadow-lg hover:bg-[#D0BCFF] transition-colors max-w-md mx-auto z-20 animate-slide-up">
        <i id="active-order-icon" data-lucide="clock" class="w-5 h-5 flex-shrink-0 animate-pulse"></i>
        <div class="flex-1 text-left">
            <p id="active-order-id" class="text-sm font-semibold">Order #</p>
            <p id="active-order-status" class="text-xs text-[#381E72]/80">Order Sent...</p>
        </div>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" class="flex-shrink-0">
            <path d="M9 6L15 12L9 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>

    <!-- Bottom Navigation -->
    <div class="fixed bottom-0 left-0 right-0 bg-[#211F26] border-t border-[#36343B] px-4 py-3 max-w-md mx-auto z-30">
        <div class="flex items-center justify-around">
            <button onclick="goToHome()" id="nav-home" class="flex flex-col items-center justify-center w-16 py-1.5 rounded-xl transition-colors bg-[#4A4458]">
                <i data-lucide="home" class="w-5 h-5 fill-[#D0BCFF] text-[#D0BCFF]"></i>
                <span class="text-[10px] leading-none mt-1 text-[#D0BCFF]">Home</span>
            </button>
            <button onclick="goToMenu()" id="nav-menu" class="flex flex-col items-center justify-center w-16 py-1.5 rounded-xl transition-colors">
                <i data-lucide="file-text" class="w-5 h-5 text-[#CAC4D0]"></i>
                <span class="text-[10px] leading-none mt-1 text-[#CAC4D0]">Menu</span>
            </button>
            <button onclick="switchTab('cart')" id="nav-cart" class="relative flex flex-col items-center justify-center w-16 py-1.5 rounded-xl transition-colors">
                <i data-lucide="shopping-bag" class="w-5 h-5 text-[#CAC4D0]"></i>
                <div id="cart-badge" class="hidden absolute top-0.5 right-2 w-3.5 h-3.5 bg-[#F2B8B5] rounded-full flex items-center justify-center">
                    <span id="cart-count" class="text-[8px] text-[#601410] font-bold">0</span>
                </div>
                <span class="text-[10px] leading-none mt-1 text-[#CAC4D0]">Cart</span>
            </button>
            <button onclick="switchTab('profile')" id="nav-profile" class="flex flex-col items-center justify-center w-16 py-1.5 rounded-xl transition-colors">
                <i data-lucide="user" class="w-5 h-5 text-[#CAC4D0]"></i>
                <span class="text-[10px] leading-none mt-1 text-[#CAC4D0]">Profile</span>
            </button>
        </div>
    </div>

    <div class="fixed inset-0 flex items-center justify-center pointer-events-none z-[9999]">
        <div id="toast" class="bg-[#4A4458] text-[#EADDFF] px-5 py-2 rounded-full text-xs font-medium opacity-0 transition-all duration-300 whitespace-nowrap translate-y-4 shadow-lg"></div>
    </div>
    <script>
        lucide.createIcons();

        function showToast(msg) {
            alert(msg);}
    </script>
</body>
</html>
